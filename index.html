<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis enlaces | Amigurumis</title>
  <meta name="description" content="Accede a todos mis enlaces de ofertas, producto, WhatsApp y TikTok." />

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="profile">
        <img
          class="avatar"
          src="https://placehold.co/160x160/f8d9df/9c5f6b?text=Logo"
          alt="Logo o foto de perfil"
        />
        <h1>Patrones de Amigurumis 🧶</h1>
        <p>
          Aquí encontrarás todos mis enlaces de compra, ofertas especiales
          y acceso a mis redes.
        </p>
      </div>

      <div class="links">
        <a class="link-btn" href="https://go.hotmart.com/V105494643W" target="_blank">
          <i class="fas fa-store"></i>
          <span>Página de Ventas</span>
        </a>

        <a class="link-btn" href="https://go.hotmart.com/V105494643W?dp=1" target="_blank">
          <i class="fas fa-book-open"></i>
          <span>Página de Producto</span>
        </a>

        <a class="link-btn featured" href="https://go.hotmart.com/V105494643W?ap=2a90" target="_blank">
          <i class="fas fa-star"></i>
          <span>Precio Promo</span>
        </a>

        <a class="link-btn" href="https://go.hotmart.com/V105494643W?ap=605c" target="_blank">
          <i class="fas fa-gem"></i>
          <span>Precio FULL</span>
        </a>

        <a class="link-btn discount" href="https://go.hotmart.com/V105494643W?ap=4bfa" target="_blank">
          <i class="fas fa-percent"></i>
          <span>50% de descuento</span>
        </a>

        <a class="link-btn discount" href="https://go.hotmart.com/V105494643W?ap=a429" target="_blank">
          <i class="fas fa-fire"></i>
          <span>75% de descuento</span>
        </a>

        <a class="link-btn" href="https://go.hotmart.com/V105494643W?ap=ddd3" target="_blank">
          <i class="fas fa-gift"></i>
          <span>Oferta con Order Bump</span>
        </a>

        <a class="link-btn" href="https://go.hotmart.com/V105494643W?ap=af17" target="_blank">
          <i class="fas fa-tag"></i>
          <span>Precio especial</span>
        </a>

        <a class="link-btn black" href="https://go.hotmart.com/V105494643W?ap=81c2" target="_blank">
          <i class="fas fa-bolt"></i>
          <span>BLACK NOVEMBER (9,99)</span>
        </a>

        <a class="link-btn whatsapp" href="PONER_AQUI_LINK_WHATSAPP" target="_blank">
          <i class="fab fa-whatsapp"></i>
          <span>Grupo de WhatsApp</span>
        </a>

        <a class="link-btn tiktok" href="PONER_AQUI_LINK_TIKTOK" target="_blank">
          <i class="fab fa-tiktok"></i>
          <span>TikTok</span>
        </a>
      </div>

      <div class="actions">
        <button class="copy-btn" id="copyBtn">
          <i class="fas fa-link"></i>
          Copiar mi enlace
        </button>
        <p id="copyMessage" class="copy-message"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
